services:
  app:
    build: .
    container_name: stockpulse-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Wewnątrz Docker network hosty to nazwy serwisów, nie localhost
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      FINBERT_SIDECAR_URL: http://finbert:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockpulse-net
    # Montuj src/ dla rozwoju — rebuild nie potrzebny przy zmianie kodu
    volumes:
      - ./src:/app/src
      - ./doc:/app/doc
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
    # W trybie dev: buduj i uruchom
    command: sh -c "npx tsc -p tsconfig.build.json && node dist/main.js"

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stockpulse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockpulse}
      POSTGRES_USER: ${POSTGRES_USER:-stockpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpulse_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpulse-net

  redis:
    image: redis:7-alpine
    container_name: stockpulse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpulse-net

  frontend:
    build: ./frontend
    container_name: stockpulse-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      API_URL: http://app:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - app
    networks:
      - stockpulse-net

  # ── FinBERT Sidecar — analiza sentymentu tekstów finansowych ──
  # GPU (CUDA):  FINBERT_DOCKERFILE=Dockerfile docker compose up finbert
  # CPU (laptop): FINBERT_DOCKERFILE=Dockerfile.cpu docker compose up finbert
  finbert:
    build:
      context: ./finbert-sidecar
      dockerfile: ${FINBERT_DOCKERFILE:-Dockerfile}
    container_name: stockpulse-finbert
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_NAME: ${FINBERT_MODEL_NAME:-ProsusAI/finbert}
      BATCH_SIZE: ${FINBERT_BATCH_SIZE:-16}
      MAX_TOKEN_LENGTH: ${FINBERT_MAX_TOKEN_LENGTH:-512}
    volumes:
      # Cache modelu HuggingFace — nie pobiera ponownie przy restart
      - finbert_cache:/app/model_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - stockpulse-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockpulse-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stockpulse.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      # Auto-rejestracja serwera PostgreSQL
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockpulse-net

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  finbert_cache:

networks:
  stockpulse-net:
    driver: bridge
