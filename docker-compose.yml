services:
  app:
    build: .
    container_name: stockpulse-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Wewnątrz Docker network hosty to nazwy serwisów, nie localhost
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stockpulse-net
    # Montuj src/ dla rozwoju — rebuild nie potrzebny przy zmianie kodu
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
    # W trybie dev: buduj i uruchom
    command: sh -c "npx tsc -p tsconfig.build.json && node dist/main.js"

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stockpulse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockpulse}
      POSTGRES_USER: ${POSTGRES_USER:-stockpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpulse_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpulse-net

  redis:
    image: redis:7-alpine
    container_name: stockpulse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpulse-net

volumes:
  postgres_data:
  redis_data:

networks:
  stockpulse-net:
    driver: bridge
