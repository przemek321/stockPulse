# Docker Compose override dla NVIDIA Jetson (JetPack 5.x, L4T R35, CUDA 11.4)
#
# Użycie:
#   docker compose -f docker-compose.yml -f docker-compose.jetson.yml up -d
#
# Zmiany względem bazowego docker-compose.yml:
#   - app: bind /proc i /sys read-only (stats kontenera Jetson)
#   - pgAdmin wyłączony (oszczędność RAM-u, dostęp przez psql/DBeaver)

services:
  app:
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

  # pgAdmin wyłączony na Jetsonie — oszczędność ~200MB RAM
  pgadmin:
    profiles:
      - pgadmin
